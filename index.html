<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>お薬チェック</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="お薬チェック">
    
    <style>
        body {
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(env(safe-area-inset-bottom) + 65px);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col selection:bg-indigo-200">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 px-4 py-3 flex items-center justify-between shadow-sm">
        <h1 class="text-xl font-bold tracking-tight text-slate-900 flex items-center gap-2">
            <i class="fa-solid fa-pills text-indigo-600"></i>お薬服用チェック
        </h1>
    </header>

    <main class="flex-1 max-w-md w-full mx-auto px-4 py-4">
        
        <section id="tab-home" class="space-y-4">
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
                <div class="flex items-center justify-between mb-4">
                    <button onclick="changeMonth(-1)" class="w-10 h-10 rounded-xl hover:bg-slate-100 active:bg-slate-200 flex items-center justify-center text-slate-600 transition-colors">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <h2 id="calendar-month" class="text-lg font-bold text-slate-800">月</h2>
                    <button onclick="changeMonth(1)" class="w-10 h-10 rounded-xl hover:bg-slate-100 active:bg-slate-200 flex items-center justify-center text-slate-600 transition-colors">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
                
                <div id="calendar-grid" class="grid grid-cols-7 gap-y-2 text-center text-sm">
                    </div>
            </div>

            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
                <div class="flex items-center justify-between mb-3 border-b border-slate-100 pb-2">
                    <h3 id="selected-date-title" class="font-bold text-slate-900">日付</h3>
                    <span id="completion-rate" class="text-xs font-semibold px-2 py-1 bg-slate-100 rounded-full text-slate-600">0/0 完了</span>
                </div>
                <div id="checklist-container" class="space-y-4 pt-1">
                    </div>
            </div>
        </section>

        <section id="tab-settings" class="space-y-4 hidden">
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
                <h3 class="font-bold text-slate-900 mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-plus-circle text-emerald-500"></i>新しいお薬の追加
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">お薬の名前</label>
                        <input type="text" id="med-name" placeholder="例: ルパフィン錠" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-indigo-500 text-sm transition-colors">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1.5">飲むタイミング（複数選択可）</label>
                        <div class="grid grid-cols-2 gap-2" id="timing-checkbox-group">
                            <label class="flex items-center gap-2 p-2.5 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer text-xs font-medium select-none transition-all active:scale-[0.98] has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-300 has-[:checked]:text-indigo-700">
                                <input type="checkbox" name="med-time" value="朝食前" class="w-4 h-4 accent-indigo-600 rounded">
                                <span>朝食前</span>
                            </label>
                            <label class="flex items-center gap-2 p-2.5 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer text-xs font-medium select-none transition-all active:scale-[0.98] has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-300 has-[:checked]:text-indigo-700">
                                <input type="checkbox" name="med-time" value="朝食後" class="w-4 h-4 accent-indigo-600 rounded">
                                <span>朝食後</span>
                            </label>
                            <label class="flex items-center gap-2 p-2.5 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer text-xs font-medium select-none transition-all active:scale-[0.98] has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-300 has-[:checked]:text-indigo-700">
                                <input type="checkbox" name="med-time" value="昼食前" class="w-4 h-4 accent-indigo-600 rounded">
                                <span>昼食前</span>
                            </label>
                            <label class="flex items-center gap-2 p-2.5 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer text-xs font-medium select-none transition-all active:scale-[0.98] has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-300 has-[:checked]:text-indigo-700">
                                <input type="checkbox" name="med-time" value="昼食後" class="w-4 h-4 accent-indigo-600 rounded">
                                <span>昼食後</span>
                            </label>
                            <label class="flex items-center gap-2 p-2.5 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer text-xs font-medium select-none transition-all active:scale-[0.98] has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-300 has-[:checked]:text-indigo-700">
                                <input type="checkbox" name="med-time" value="夕食前" class="w-4 h-4 accent-indigo-600 rounded">
                                <span>夕食前</span>
                            </label>
                            <label class="flex items-center gap-2 p-2.5 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer text-xs font-medium select-none transition-all active:scale-[0.98] has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-300 has-[:checked]:text-indigo-700">
                                <input type="checkbox" name="med-time" value="夕食後" class="w-4 h-4 accent-indigo-600 rounded">
                                <span>夕食後</span>
                            </label>
                            <label class="flex items-center gap-2 p-2.5 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer text-xs font-medium select-none transition-all active:scale-[0.98] has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-300 has-[:checked]:text-indigo-700">
                                <input type="checkbox" name="med-time" value="就寝前" class="w-4 h-4 accent-indigo-600 rounded">
                                <span>就寝前</span>
                            </label>
                            <label class="flex items-center gap-2 p-2.5 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer text-xs font-medium select-none transition-all active:scale-[0.98] has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-300 has-[:checked]:text-indigo-700">
                                <input type="checkbox" name="med-time" value="頓服（必要時）" class="w-4 h-4 accent-indigo-600 rounded">
                                <span>頓服（必要時）</span>
                            </label>
                        </div>
                    </div>
                    
                    <button onclick="addMedication()" class="w-full bg-indigo-600 text-white font-semibold py-2.5 rounded-xl hover:bg-indigo-700 active:scale-[0.98] transition-all text-sm shadow-sm shadow-indigo-100">
                        お薬を登録する
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
                <h3 class="font-bold text-slate-900 mb-3">登録中のお薬一覧</h3>
                <div id="med-manager-list" class="space-y-2">
                    </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200 px-6 py-2 flex justify-around items-center z-50">
        <button onclick="switchTab('home')" id="nav-home" class="flex flex-col items-center gap-1 text-indigo-600 transition-colors w-20">
            <i class="fa-solid fa-calendar-check text-xl"></i>
            <span class="text-[10px] font-medium">チェック</span>
        </button>
        <button onclick="switchTab('settings')" id="nav-settings" class="flex flex-col items-center gap-1 text-slate-400 transition-colors w-20">
            <i class="fa-solid fa-gear text-xl"></i>
            <span class="text-[10px] font-medium">お薬の管理</span>
        </button>
    </nav>

    <script>
        let currentYear, currentMonth;
        let selectedDateStr; 
        let medications = [];
        let history = {};

        // 時系列順に並べたマスター配列
        const TIMING_ORDER = ['朝食前', '朝食後', '昼食前', '昼食後', '夕食前', '夕食後', '就寝前', '頓服（必要時）'];

        window.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            selectedDateStr = formatDate(today);

            medications = JSON.parse(localStorage.getItem('medications')) || [];
            history = JSON.parse(localStorage.getItem('med_history')) || {};

            // 旧データ（単一文字列のtime型）が存在する場合の配列型自動マイグレーション
            medications.forEach(med => {
                if (med.time && !med.times) {
                    med.times = [med.time];
                    delete med.time;
                }
            });

            if (medications.length === 0) {
                medications = [
                    { id: 'sample1', name: 'サンプルの非アレルギー薬', times: ['就寝前'] },
                    { id: 'sample2', name: 'ビタミン剤', times: ['朝食前', '朝食後'] }
                ];
                localStorage.setItem('medications', JSON.stringify(medications));
            }

            renderCalendar();
            renderCheckList();
        });

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // 1日の中の「総服薬タスク数」と「完了数」を算出する共通ヘルパー
        function getDayStats(dateStr) {
            let total = 0;
            let taken = 0;
            const dayHistory = history[dateStr] || {};

            medications.forEach(med => {
                if (med.times && med.times.length > 0) {
                    med.times.forEach(t => {
                        total++;
                        // 履歴キーは「薬ID_タイミング名」で一意に識別
                        if (dayHistory[`${med.id}_${t}`]) {
                            taken++;
                        }
                    });
                }
            });
            return { total, taken };
        }

        // カレンダー描画処理（チェックボックス風四角形デザイン維持）
        function renderCalendar() {
            document.getElementById('calendar-month').textContent = `${currentYear}年 ${currentMonth + 1}月`;
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
            weekdays.forEach((day, idx) => {
                const el = document.createElement('div');
                el.className = `text-center text-xs font-bold pb-2 ${idx === 0 ? 'text-rose-500' : idx === 6 ? 'text-sky-500' : 'text-slate-400'}`;
                el.textContent = day;
                grid.appendChild(el);
            });

            const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
            const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();
            const prevTotalDays = new Date(currentYear, currentMonth, 0).getDate();

            for (let i = firstDayIndex - 1; i >= 0; i--) {
                const el = document.createElement('div');
                el.className = 'text-center text-slate-200 py-2.5 text-sm';
                el.textContent = prevTotalDays - i;
                grid.appendChild(el);
            }

            const todayStr = formatDate(new Date());
            for (let d = 1; d <= totalDays; d++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const el = document.createElement('div');
                
                // 統計データの取得
                const stats = getDayStats(dateStr);
                const isComplete = stats.total > 0 && stats.taken === stats.total;
                const isPartial = stats.total > 0 && stats.taken > 0 && stats.taken < stats.total;

                let baseClass = 'text-center py-1.5 text-sm cursor-pointer relative flex flex-col items-center justify-center m-0.5 transition-all rounded-xl aspect-square';
                let bgClass = 'hover:bg-slate-100';
                let textClass = 'text-slate-700 font-medium relative z-10';
                
                const bgCheck = document.createElement('i');
                bgCheck.className = 'fa-solid fa-check absolute text-4xl opacity-0 transition-opacity z-0';

                if (dateStr === selectedDateStr) {
                    bgClass = 'bg-indigo-600 text-white font-bold shadow-sm shadow-indigo-200';
                    textClass = 'text-white relative z-10';
                    if (isComplete) bgCheck.className += ' text-white/20 opacity-100';
                } else if (isComplete) {
                    bgClass = 'bg-emerald-100 hover:bg-emerald-200 text-emerald-800 font-bold';
                    textClass = 'text-emerald-800 relative z-10';
                    bgCheck.className += ' text-emerald-600/30 opacity-100';
                } else if (dateStr === todayStr) {
                    bgClass = 'bg-indigo-50 border border-indigo-200 text-indigo-600 font-bold';
                    textClass = 'text-indigo-600 relative z-10';
                }

                el.className = `${baseClass} ${bgClass}`;
                
                const dayNum = document.createElement('span');
                dayNum.className = textClass;
                dayNum.textContent = d;
                el.appendChild(dayNum);
                el.appendChild(bgCheck);

                if (!isComplete && isPartial) {
                    const indicator = document.createElement('span');
                    indicator.className = 'text-[9px] mt-0.5 h-3 flex items-center justify-center transition-colors relative z-10';
                    indicator.className += dateStr === selectedDateStr ? ' w-1.5 h-1.5 rounded-full bg-white' : ' w-1.5 h-1.5 rounded-full bg-amber-400';
                    el.appendChild(indicator);
                } else {
                    const indicator = document.createElement('span');
                    indicator.className = 'text-[9px] mt-0.5 h-3';
                    el.appendChild(indicator);
                }

                el.addEventListener('click', () => {
                    selectedDateStr = dateStr;
                    renderCalendar();
                    renderCheckList();
                });
                grid.appendChild(el);
            }
        }

        // 【大幅改修】タイミング別にグループ化してチェック画面を描画
        function renderCheckList() {
            const container = document.getElementById('checklist-container');
            container.innerHTML = '';
            
            const dateObj = new Date(selectedDateStr);
            const options = { weekday: 'short', month: 'short', day: 'numeric' };
            document.getElementById('selected-date-title').textContent = dateObj.toLocaleDateString('ja-JP', options);

            const stats = getDayStats(selectedDateStr);
            document.getElementById('completion-rate').textContent = `${stats.taken}/${stats.total} 完了`;
            
            const rateBadge = document.getElementById('completion-rate');
            if (stats.total > 0 && stats.taken === stats.total) {
                rateBadge.className = "text-xs font-semibold px-2 py-1 bg-emerald-100 rounded-full text-emerald-700";
            } else {
                rateBadge.className = "text-xs font-semibold px-2 py-1 bg-slate-100 rounded-full text-slate-600";
            }

            if (stats.total === 0) {
                container.innerHTML = `<div class="text-center py-8 text-slate-400 text-sm"><i class="fa-solid fa-box-open text-2xl mb-2 block text-slate-300"></i>お薬が登録されていないか、タイミングが指定されていません。</div>`;
                return;
            }

            const dayHistory = history[selectedDateStr] || {};

            // 各タイミングを巡回してグループ化表示
            TIMING_ORDER.forEach(timingKey => {
                // この時間帯に対象となるお薬を抽出
                const targetMeds = medications.filter(med => med.times && med.times.includes(timingKey));
                if (targetMeds.length === 0) return; // 該当がなければスキップ

                // グループ用コンテナ
                const groupSection = document.createElement('div');
                groupSection.className = 'space-y-1.5 bg-slate-50/50 p-2.5 rounded-xl border border-slate-100';

                // タイミングヘッダー
                const headerDiv = document.createElement('div');
                headerDiv.className = 'flex items-center gap-1.5 text-xs font-bold text-indigo-600 px-1 mb-1';
                headerDiv.innerHTML = `<i class="fa-regular fa-clock"></i><span>${timingKey}</span>`;
                groupSection.appendChild(headerDiv);

                // その時間帯の薬を並べる
                targetMeds.forEach(med => {
                    const uniqueKey = `${med.id}_${timingKey}`;
                    const isChecked = dayHistory[uniqueKey] || false;

                    const item = document.createElement('div');
                    item.className = `flex items-center justify-between p-3 rounded-lg border bg-white transition-all ${isChecked ? 'border-emerald-200 bg-emerald-50/30' : 'border-slate-200/70 hover:border-slate-300'}`;
                    
                    item.innerHTML = `
                        <div class="flex-1 min-w-0 pr-2" onclick="toggleCheck('${med.id}', '${timingKey}')">
                            <span class="font-bold text-sm block truncate ${isChecked ? 'line-through text-slate-400' : 'text-slate-800'}">${med.name}</span>
                        </div>
                        <button onclick="toggleCheck('${med.id}', '${timingKey}')" class="w-8 h-8 rounded-full flex items-center justify-center border-2 flex-shrink-0 transition-all ${isChecked ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300 text-transparent active:border-indigo-500'}">
                            <i class="fa-solid fa-check text-xs"></i>
                        </button>
                    `;
                    groupSection.appendChild(item);
                });

                container.appendChild(groupSection);
            });
        }

        // チェック状態のON/OFF
        function toggleCheck(medId, timingKey) {
            if (!history[selectedDateStr]) {
                history[selectedDateStr] = {};
            }
            const uniqueKey = `${medId}_${timingKey}`;
            history[selectedDateStr][uniqueKey] = !history[selectedDateStr][uniqueKey];
            localStorage.setItem('med_history', JSON.stringify(history));
            
            renderCheckList();
            renderCalendar();
        }

        // 管理画面の一覧描画
        function renderMedicationManager() {
            const container = document.getElementById('med-manager-list');
            container.innerHTML = '';

            if (medications.length === 0) {
                container.innerHTML = `<p class="text-center py-4 text-sm text-slate-400">お薬は未登録です。</p>`;
                return;
            }

            medications.forEach(med => {
                // タイミングを時系列順にソートしてバッジ形式で出力
                const sortedTimes = TIMING_ORDER.filter(t => med.times && med.times.includes(t));
                const badgesHtml = sortedTimes.map(t => `<span class="text-[10px] bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded font-medium">${t}</span>`).join(' ');

                const item = document.createElement('div');
                item.className = 'flex items-center justify-between p-3 bg-slate-50 border border-slate-100 rounded-xl';
                item.innerHTML = `
                    <div class="flex flex-col gap-1 flex-1 min-w-0 pr-2">
                        <span class="font-bold text-sm text-slate-800 truncate">${med.name}</span>
                        <div class="flex flex-wrap gap-1">${badgesHtml}</div>
                    </div>
                    <button onclick="deleteMedication('${med.id}')" class="w-8 h-8 rounded-lg text-rose-500 hover:bg-rose-50 active:bg-rose-100 flex items-center justify-center flex-shrink-0 transition-colors">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                `;
                container.appendChild(item);
            });
        }

        // お薬の新規追加
        function addMedication() {
            const nameInput = document.getElementById('med-name');
            const checkedBoxes = document.querySelectorAll('input[name="med-time"]:checked');
            
            if (!nameInput.value.trim()) {
                alert('お薬の名前を入力してください。');
                return;
            }
            if (checkedBoxes.length === 0) {
                alert('飲むタイミングを1つ以上選択してください。');
                return;
            }

            const selectedTimes = Array.from(checkedBoxes).map(cb => cb.value);

            const newMed = {
                id: 'med_' + Date.now(),
                name: nameInput.value.trim(),
                times: selectedTimes
            };

            medications.push(newMed);
            localStorage.setItem('medications', JSON.stringify(medications));
            
            // 入力リセット
            nameInput.value = '';
            checkedBoxes.forEach(cb => cb.checked = false);
            
            renderMedicationManager();
            alert('お薬を登録しました。');
        }

        function deleteMedication(id) {
            if (confirm('このお薬を削除しますか？ (服薬履歴データにも影響します)')) {
                medications = medications.filter(m => m.id !== id);
                localStorage.setItem('medications', JSON.stringify(medications));
                renderMedicationManager();
            }
        }

        function changeMonth(direction) {
            currentMonth += direction;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            } else if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        }

        function switchTab(tabName) {
            if (tabName === 'home') {
                document.getElementById('tab-home').classList.remove('hidden');
                document.getElementById('tab-settings').classList.add('hidden');
                document.getElementById('nav-home').className = "flex flex-col items-center gap-1 text-indigo-600 transition-colors w-20";
                document.getElementById('nav-settings').className = "flex flex-col items-center gap-1 text-slate-400 transition-colors w-20";
                renderCalendar();
                renderCheckList();
            } else {
                document.getElementById('tab-home').classList.add('hidden');
                document.getElementById('tab-settings').classList.remove('hidden');
                document.getElementById('nav-home').className = "flex flex-col items-center gap-1 text-slate-400 transition-colors w-20";
                document.getElementById('nav-settings').className = "flex flex-col items-center gap-1 text-indigo-600 transition-colors w-20";
                renderMedicationManager();
            }
        }
    </script>
</body>
</html>
